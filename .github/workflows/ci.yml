name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint -- --max-warnings=200   # Initial high threshold while we clean existing code per modernization plan. Will be lowered.

      - name: Build (Chrome + Firefox)
        run: npm run build

      - name: Security audit (production)
        run: npm audit --audit-level=high --production || true   # non-blocking for now; see #7
